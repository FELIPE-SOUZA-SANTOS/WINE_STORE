<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Administração</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <h2>Painel Administrativo</h2>

    <nav>
        <a href="/">Loja</a>
        <a href="/logout">Sair</a>
    </nav>
</header>

<h1 style="text-align:center">
    Gerenciar Produtos
</h1>

<table>

<tr>
    <th>ID</th>
    <th>Nome</th>
    <th>Preço</th>
    <th>Estoque</th>
    <th>Ações</th>
</tr>

{% for produto in produtos %}

<tr>

<td>{{ produto.id }}</td>

<td>{{ produto.nome }}</td>

<td>R$ {{ produto.preco }}</td>

<td>{{ produto.estoque }}</td>

<td>

<a class="btn"
href="/admin/editar/{{ produto.id }}">
Editar
</a>

<a class="btn"
href="/admin/deletar/{{ produto.id }}"
onclick="return confirm('Deseja excluir este produto?')">
Excluir
</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
