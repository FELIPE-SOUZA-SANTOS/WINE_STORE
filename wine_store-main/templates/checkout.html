<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Checkout</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<div class="checkout">

<h1>Finalizar Compra</h1>

<form action="/checkout" method="POST">

    <input type="text"
           name="nome"
           placeholder="Nome Completo"
           required>

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <input type="text"
           name="telefone"
           placeholder="Telefone"
           required>

    <button type="submit">
        Confirmar Pedido
    </button>

</form>

</div>

</body>
</html>
