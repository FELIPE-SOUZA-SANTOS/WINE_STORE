<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="login-container">

    <h1>🍷 Wine Store</h1>

    <h2>Login Administrativo</h2>

    <form action="/autenticar" method="POST">

        <input
            type="text"
            name="usuario"
            placeholder="Usuário"
            required>

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required>

        <button type="submit">
            Entrar
        </button>

    </form>

</div>

</body>
</html>
